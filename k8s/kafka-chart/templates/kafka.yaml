apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          ports:
{{- range .Values.kafka.ports }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
{{- end }}
          env:
{{- range $key, $value := .Values.kafka.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
{{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
{{- range .Values.kafka.ports }}
    - name: {{ .name }}
      protocol: TCP
      port: {{ .targetPort }}
      targetPort: {{ .targetPort }}
{{- end }}
  type: ClusterIP
