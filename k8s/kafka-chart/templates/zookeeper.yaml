apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  labels:
    app: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: {{ .Values.zookeeper.image }}
          ports:
{{- range .Values.zookeeper.ports }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
{{- end }}
          env:
{{- range $key, $value := .Values.zookeeper.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  labels:
    app: zookeeper
spec:
  selector:
    app: zookeeper
  ports:
{{- range .Values.zookeeper.ports }}
    - name: {{ .name }}
      protocol: TCP
      port: {{ .targetPort }}
      targetPort: {{ .targetPort }}
{{- end }}
  type: ClusterIP
