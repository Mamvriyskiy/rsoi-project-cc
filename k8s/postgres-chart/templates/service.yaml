{{- $name := .Values.name | default "postgres" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-service
  labels:
    app.kubernetes.io/name: {{ $name }}-service
    app.kubernetes.io/version: "{{ .Values.version }}"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: micro-services
    app.kubernetes.io/managed-by: helm
spec:
  selector:
    app: {{ $name }}
  ports:
    - protocol: TCP
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
